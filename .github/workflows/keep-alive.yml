# Supabase Keep-Alive — Backup
#
# Propósito: Respaldo del cron de Vercel.
# Hace ping directo a Supabase cada 4 días para prevenir pausa por inactividad.
# El plan gratuito de Supabase pausa proyectos después de 7 días sin actividad.
#
# Doble protección:
#   - Vercel cron: cada día a las 09:00 UTC (vercel.json)
#   - Este workflow: cada 4 días a las 10:00 UTC (backup)

name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 10 */4 * *'   # Cada 4 días a las 10:00 UTC
  workflow_dispatch:           # Permite ejecución manual desde GitHub Actions

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase REST API
        run: |
          SUPABASE_URL="https://ttchpzlsjkazuqhpmazv.supabase.co"
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0Y2hwemxzamthenVxaHBtYXp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODkwMjAsImV4cCI6MjA4ODA2NTAyMH0.uxpuIjFkphgnD4bmK6F88c7hjsH_plzxVFTa12VjEZU"

          echo "🏓 Haciendo ping a Supabase: $SUPABASE_URL"
          echo "🕐 Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY" \
            --max-time 30)

          echo "📊 HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
            echo "✅ Supabase activo — proyecto protegido contra pausa."
          else
            echo "⚠️ Respuesta inesperada: $HTTP_CODE"
            exit 1
          fi
